<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI | Регистрация</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-page">
<main class="auth-layout">
    <section class="auth-brand">
        <p class="eyebrow">Universal AI Chat</p>
        <h1>Создание аккаунта</h1>
        <p class="lead">
            Зарегистрируйте пользователя, чтобы после этого войти в систему и продолжить разработку AI-чата.
        </p>
    </section>

    <section class="auth-card">
        <h2>Регистрация</h2>
        <p class="muted">После регистрации вы будете автоматически авторизованы.</p>

        <form id="register-form" class="auth-form">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="Введите username" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Введите email" required>

            <label for="password">Пароль</label>
            <input id="password" name="password" type="password" placeholder="Минимум 8 символов" required>

            <button type="submit">Создать аккаунт</button>
        </form>

        <p class="switch-link">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </p>
        <p id="register-message" class="form-message" aria-live="polite"></p>
    </section>
</main>

<script src="/js/app-events.js"></script>
<script src="/js/auth-client.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
